<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temb AI | Samsen Edition</title>
    <style>
        :root {
            --bg: #020617;
            --card: #1e293b;
            --primary: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --text: #f8fafc;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        #memory-radar {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            background: var(--error);
            border: 4px solid #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: all 0.5s ease;
        }

        #chat-container {
            width: 90%;
            max-width: 600px;
            height: 70vh;
            background: var(--card);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }

        #chat-header {
            background: #0f172a;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
        }

        #log {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #0f172a;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 1rem;
        }

        .user {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background: #334155;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #475569;
        }

        .input-area {
            padding: 20px;
            background: #1e293b;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        button {
            padding: 0 25px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; transform: scale(1.05); }

        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="memory-radar">🔍 SEARCHING FOR TEMB'S BRAIN...</div>

    <div id="chat-container">
