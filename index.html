<!DOCTYPE html>
<html>
<head>
    <title>Temb AI: Ultra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 20px; text-align: center; }
        #chat-container { max-width: 500px; margin: auto; background: #1e293b; border-radius: 15px; padding: 20px; border: 2px solid #334155; }
        
        /* 🚨 THE BAR IS HERE! 🚨 */
        #memory-radar { 
            background: #ef4444; /* Starts RED if it fails */
            color: white; 
            padding: 15px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            font-weight: bold;
            border: 3px solid #ffffff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #log { height: 350px; overflow-y: auto; text-align: left; margin-bottom: 15px; padding: 10px; background: #0f172a; border-radius: 10px; }
        .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; }
        .user { background: #3b82f6; color: white; margin-left: 15%; }
        .bot { background: #334155; color: #f1f5f9; margin-right: 15%; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border-radius: 8px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="chat-container">
        <div id="memory-radar">📡 SEARCHING FOR TEMB'S BRAIN...</div>
        
        <h2>🧠 Temb-GPT Ultra</h2>
        <div id="log">
            <div class="msg bot"><b>Temb:</b> 555! Yo Temsin! Check the bar above. Is it green yet?</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask Temb..." onkeypress="if(event.key==='Enter') askTemb()">
            <button onclick="askTemb()">Send</button>
        </div>
    </div>

    <script>
        let tembMemory = [];

        async function syncKnowledge() {
            const radar = document.getElementById('memory-radar');
            try {
                // 🔗 Change 'temsin2135' to your ACTUAL GitHub username!
                const rawUrl = 'https://raw.githubusercontent.com/temsin2135/Temb-AI/main/knowledge.json?v=' + Date.now();
                
                const res = await fetch(rawUrl);
                if (res.ok) {
                    tembMemory = await res.json();
                    if (tembMemory.length > 5) {
                        radar.innerText = `✅ TEMB BRAIN ACTIVE: ${tembMemory.length} FACTS!`;
                        radar.style.background = "#22c55e"; // TURN GREEN
                    } else {
                        radar.innerText = "⚠️ FILE FOUND BUT IT'S EMPTY! RUN ACTION!";
                        radar.style.background = "#f59e0b"; // TURN ORANGE
                    }
                } else {
                    radar.innerText = "❌ ERROR: KNOWLEDGE.JSON NOT FOUND!";
                    radar.style.background = "#ef4444"; // STAY RED
                }
            } catch (e) {
                radar.innerText = "❌ CONNECTION FAILED!";
            }
        }

        syncKnowledge();

        async function askTemb() {
            const inputField = document.getElementById('userInput');
            const input = inputField.value.trim();
            if (!input) return;

            const log = document.getElementById('log');
            log.innerHTML += `<div class="msg user"><b>You:</b> ${input}</div>`;
            inputField.value = "";
            log.scrollTop = log.scrollHeight;

            try {
                const randomFacts = tembMemory.length > 0 ? tembMemory.sort(() => 0.5 - Math.random()).slice(0, 5).join(". ") : "No facts yet.";
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "google/gemini-2.0-flash-exp:free",
                        "messages": [
                            {"role": "system", "content": `You are Temb, witty AI for Temsin (Grade 8). Knowledge: ${randomFacts}. Say 555! often.`},
                            {"role": "user", "content": input}
                        ]
                    })
                });
                const data = await response.json();
                log.innerHTML += `<div class="msg bot"><b>Temb:</b> ${data.choices[0].message.content}</div>`;
            } catch (err) {
                log.innerHTML += `<div class="msg bot"><b>Error:</b> API limit or key issue!</div>`;
            }
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
