name: Temb Auto-Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper and Force Save
        run: |
          python -c "
          import requests, json
          knowledge = []
          try:
              print('📡 Requesting 1.21 Database...')
              headers = {'User-Agent': 'Mozilla/5.0'}
              url = 'https://raw.githubusercontent.com/PrismarineJS/minecraft-data/master/data/pc/1.21/items.json'
              res = requests.get(url, headers=headers, timeout=15)
              if res.ok:
                  items = res.json()
                  knowledge = [f'The item {i[\"displayName\"]} has the ID {i[\"name\"]}.' for i in items[:250]]
                  print(f'✅ Learned {len(knowledge)} items!')
          except Exception as e:
              print(f'⚠️ Web fetch failed: {e}')

          personal_facts = [
              'Temsin is a Grade 8 student at Samsen School in M.2/8.',
              'Temsin is a technical Minecraft and Redstone Engineering expert.',
              'Temsin uses the name LagSpike6728 in Roblox.',
              'Temb is Temsin\'s personal AI assistant for Samsen projects.'
          ]
          knowledge.extend(personal_facts)

          with open('knowledge.json', 'w') as f:
              json.dump(knowledge, f)
          "

      - name: Push to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add knowledge.json
          git commit -m "Temb learned 250+ Minecraft items! 555" || true
          git push origin main
