name: Temb Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🚀 THIS LINE STOPS THE NODE.JS 20 WARNINGS!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🧠 Gives Temb the 'Write' brain
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use the built-in secret token to authenticate
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          python -c "
          import requests, json
          try:
              print('📡 Fetching Minecraft Data...')
              url = 'https://raw.githubusercontent.com/PrismarineJS/minecraft-data/master/data/pc/1.21/items.json'
              items = requests.get(url).json()
              knowledge = [f'The item {i[\"displayName\"]} has the ID {i[\"name\"]}.' for i in items[:100]]
              knowledge.append('Temsin is a Grade 8 student at Samsen School.')
              with open('knowledge.json', 'w') as f:
                  json.dump(knowledge, f)
              print('✅ knowledge.json created!')
          except Exception as e:
              print(f'❌ Error: {e}')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge.json
          # Only commit if there are changes (prevents the Error 1)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Update: Temb learned Minecraft Wiki! 555" && git push)
