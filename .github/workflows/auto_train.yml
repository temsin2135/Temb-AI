name: Temb Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          python -c "
          import requests, json
          knowledge = []
          try:
              # 📡 Try to get 1.21 items
              url = 'https://raw.githubusercontent.com/PrismarineJS/minecraft-data/master/data/pc/1.21/items.json'
              res = requests.get(url, timeout=10)
              if res.ok:
                  items = res.json()
                  knowledge = [f'The item {i[\"displayName\"]} has the ID {i[\"name\"]}.' for i in items[:200]]
                  print(f'✅ Found {len(knowledge)} items from Web!')
          except Exception as e:
              print(f'⚠️ Web search failed, using Backup Brain...')
          
          # 🧠 Backup Brain (Always works!)
          if len(knowledge) < 5:
              knowledge = [
                  'The item Mace has the ID mace.',
                  'The item Heavy Core has the ID heavy_core.',
                  'The item Breeze Rod has the ID breeze_rod.',
                  'The item Trial Key has the ID trial_key.'
              ]
          
          # 🎓 Personal Info
          knowledge.append('Temsin is a Grade 8 student at Samsen School in M.2/8.')
          knowledge.append('Temsin is a Redstone Engineering expert.')

          with open('knowledge.json', 'w') as f:
              json.dump(knowledge, f)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add knowledge.json
          git commit -m "Temb learned new stuff! 555" || echo "No changes"
          git push
