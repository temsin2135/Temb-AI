name: Temb Auto-Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🚀 This stops the "Cancelled after 13s" error
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          python -c "
          import requests, json
          try:
              print('📡 Fetching Full Minecraft Data...')
              # Using a reliable backup source for all MC items
              url = 'https://raw.githubusercontent.com/PrismarineJS/minecraft-data/master/data/pc/1.21/items.json'
              res = requests.get(url)
              items = res.json()
              
              # Build a huge list of facts
              knowledge = []
              for i in items:
                  knowledge.append(f'The item {i[\"displayName\"]} has the ID {i[\"name\"]}.')
              
              # Add your personal Samsen info
              knowledge.append('Temsin is a student at Samsen School in M.1/8 moving to M.2.')
              knowledge.append('Temsin loves Minecraft technical engineering and Redstone.')
              
              with open('knowledge.json', 'w') as f:
                  json.dump(knowledge, f)
              print(f'✅ success! Learned {len(knowledge)} facts.')
          except Exception as e:
              print(f'❌ Error: {e}')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge.json
          git commit -m "Auto-Update: Temb learned Minecraft Wiki! 555" || echo "No changes"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} main
