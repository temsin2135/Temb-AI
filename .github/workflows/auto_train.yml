name: Temb Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 🚀 This forces the latest Node.js version to stop those warnings!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 🔑 THIS FIXES ERROR 128: It tells the bot exactly which branch to use
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scraper
        run: |
          python -c "
          import requests, json
          try:
              print('📡 Fetching Minecraft 1.21 Wiki Data...')
              url = 'https://raw.githubusercontent.com/PrismarineJS/minecraft-data/master/data/pc/1.21/items.json'
              items = requests.get(url).json()
              knowledge = [f'The item {i[\"displayName\"]} has the ID {i[\"name\"]}.' for i in items[:150]]
              knowledge.append('Temsin is a Grade 8 student at Samsen School.')
              with open('knowledge.json', 'w') as f:
                  json.dump(knowledge, f)
              print('✅ knowledge.json is ready!')
          except Exception as e:
              print(f'❌ Scraper Error: {e}')
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge.json
          # Only push if something actually changed!
          if git diff --staged --quiet; then
            echo "No changes to commit. Temb is already smart! 555!"
          else
            git commit -m "Auto-Update: Temb learned Minecraft Wiki! 555"
            git push origin main
          fi
