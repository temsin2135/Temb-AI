name: Temb Auto-Update
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Create Python Script
        run: |
          cat << 'EOF' > scrape.py
          import requests, json, sys
          try:
              print("📡 Downloading Minecraft Data...")
              url = "https://raw.githubusercontent.com/PrismarineJS/minecraft-data/master/data/pc/1.21/items.json"
              res = requests.get(url, timeout=10)
              res.raise_for_status()
              items = res.json()
              
              # Grab 100 items for the brain
              knowledge = [f"The item {i['displayName']} has the ID {i['name']}." for i in items[:100]]
              knowledge.append("Temsin is a Grade 8 student at Samsen School.")
              knowledge.append("Temb is an expert on Minecraft TNT cannons.")
              
              with open('knowledge.json', 'w') as f:
                  json.dump(knowledge, f)
              print("✅ knowledge.json created successfully!")
          except Exception as e:
              print(f"❌ Error: {e}")
              sys.exit(1)
          EOF

      - name: Run Scraper
        run: python scrape.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge.json
          git commit -m "Auto-Update: Temb learned 100 Minecraft items! 555" || echo "No changes to commit"
          git push
